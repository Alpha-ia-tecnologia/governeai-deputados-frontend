project_name: governe-ai-frontend
project_type: web_application
description: "Governe AI Deputados - Political management system for Brazilian congressional representatives (deputados). Features agenda management, voter tracking, leader management, legislative bills, CEAP expense tracking, political contacts, staff management, election analysis, and user administration."

tech_stack:
  framework: "React Native (Expo SDK 54)"
  language: "TypeScript"
  runtime: "Web (React Native Web)"
  bundler: "Metro"
  routing: "expo-router v6"
  state_management: "Zustand, React Context"
  http_client: "Axios"
  styling: "StyleSheet (React Native)"
  icons: "lucide-react-native"
  ui_components: "Custom components in @/components/Advanced"

local_url: "http://localhost:8081"
backend_url: "http://localhost:3750"

authentication:
  type: "JWT"
  login_page: "/login"
  fields:
    - name: "email"
      type: "text"
    - name: "password"
      type: "password"

pages:
  - path: "/login"
    description: "Login page with email and password fields"
  - path: "/(tabs)/home"
    description: "Dashboard home with KPIs and stats"
  - path: "/(tabs)/agenda"
    description: "Appointment/agenda management with CRUD operations"
  - path: "/(tabs)/voters"
    description: "Voter listing and management"
  - path: "/(tabs)/politico"
    description: "Political activities overview"
  - path: "/(tabs)/legislativo"
    description: "Legislative overview"
  - path: "/(tabs)/gabinete"
    description: "Office management"
  - path: "/(tabs)/settings"
    description: "App settings"
  - path: "/add-voter"
    description: "Add new voter form"
  - path: "/add-leader"
    description: "Add new leader form"
  - path: "/manage-bills"
    description: "CRUD for legislative bills"
  - path: "/manage-ceap"
    description: "CEAP expense tracking with quota management"
  - path: "/manage-cities"
    description: "City management for electoral regions (Maranhão)"
  - path: "/manage-requests"
    description: "Executive requests management (ofícios, indicações, requerimentos)"
  - path: "/manage-staff"
    description: "Staff management"
  - path: "/manage-tasks"
    description: "Task management"
  - path: "/manage-votes"
    description: "Voting records management"
  - path: "/manage-political-contacts"
    description: "Political contacts management"
  - path: "/manage-leaders"
    description: "Leaders listing and management"
  - path: "/gerenciamento-usuarios"
    description: "User administration (admin only)"
  - path: "/admin-panel"
    description: "Admin panel"
  - path: "/election-analysis"
    description: "Election analytics dashboard"
  - path: "/profile"
    description: "User profile page"
  - path: "/help-support"
    description: "Help and support page"

features:
  - "User authentication with JWT tokens"
  - "Role-based access control (admin, vereador, assessor)"
  - "Voter registration and management"
  - "Leader registration and management"
  - "Appointment/agenda scheduling"
  - "Legislative bill tracking (PL, PEC, PLP, etc.)"
  - "CEAP expense tracking with monthly quota"
  - "City management for Maranhão municipalities"
  - "Executive requests management"
  - "Staff management"
  - "Task management"
  - "Voting records"
  - "Political contacts"
  - "Election analysis and analytics"
  - "User administration"
  - "Dark/light theme support"
  - "Modern alert dialog modals (useAlertDialog)"
